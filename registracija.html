<section class="container">
    <h2>Registrujte se i ostvarite popuste</h2>
    <p>Pridružite se našem programu lojalnosti i skupljajte bodove za ekskluzivne pogodnosti.</p>

    <div class="form-container">
<form onsubmit="return showMessage(event)">
    <input type="text" placeholder="Ime i prezime" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Lozinka" required>
    <button type="submit" class="btn">Registruj se</button>
</form>

<p id="successMessage" style="color:green; margin-top:15px; font-weight:bold;"></p>

<script>
function showMessage(event) {
    event.preventDefault();
    document.getElementById("successMessage").innerText =
        "Registracija uspešna!";
    return false;
}
</script>
    </div>
</section>
